<title>طلب اوردر فرع السبائك — SWAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --green:#d9e7d2;        /* sage header */
    --green-deep:#274a36;
    --peach:#fbe2cf;        /* purchase header */
    --peach-text:#8a4b25;
    --gold:#b8985a;
    --gold-deep:#8f7438;
    --line:#3a3a34;         /* thin grid line */
    --line-out:#2a2a25;     /* outer border */
    --magenta:#bb3d89;
    --ink:#222219;
    --bg:#ededE4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:'Tajawal',system-ui,sans-serif;background:var(--bg);
       color:var(--ink);padding:14px 8px 26px;-webkit-font-smoothing:antialiased;touch-action:manipulation;overflow-x:hidden}

  .sheet{max-width:520px;margin:0 auto;background:#fff;-webkit-print-color-adjust:exact;print-color-adjust:exact;
         border:2px solid var(--line-out);box-shadow:0 10px 26px rgba(0,0,0,.12)}

  /* ===== Header: columns align with table (17/17/49/17) ===== */
  .hdr{
    display:grid;
    grid-template-columns:17% 17% 49% 17%;
    grid-template-areas:
      "title title logo date"
      "gl    gc    logo date"
      "sl    sc    logo date";
    background:var(--green);
  }
  .hdr > *{border-inline-start:1px solid var(--line);min-width:0}
  .h-title{grid-area:title;text-align:center;font-weight:800;font-size:13px;
           color:var(--green-deep);padding:8px 4px;border-bottom:1px solid var(--line);
           line-height:1.25;background:transparent}
  .h-gl{grid-area:gl}.h-gc{grid-area:gc}.h-sl{grid-area:sl}.h-sc{grid-area:sc}
  .m-lab{display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;
         border-top:1px solid var(--line)}
  .m-chk{display:flex;align-items:center;justify-content:center;background:transparent;
         border-top:1px solid var(--line);cursor:pointer;padding:5px 0}
  .m-chk input{display:none}
  .box{width:20px;height:20px;border:2px solid #5e9a4e;border-radius:3px;background:#fff;
       display:grid;place-items:center}
  .box::after{content:"✓";font-size:13px;font-weight:800;color:#1f7a4d;opacity:0;line-height:1}
  .m-chk input:checked + .box::after{opacity:1}

  .h-logo{grid-area:logo;display:flex;align-items:center;justify-content:center;padding:5px}
  .logo-img{max-width:100%;max-height:62px;height:auto;display:block;object-fit:contain}

  .h-date{grid-area:date;display:flex;flex-direction:column;position:relative}
  .d-lab{text-align:center;font-weight:800;font-size:13px;color:var(--green-deep);
         padding:6px 2px;border-bottom:1px solid var(--line)}
  .d-val{flex:1;min-width:0;border:none;background:transparent;font-family:inherit;font-weight:700;
         font-size:12.5px;color:var(--ink);text-align:center;cursor:pointer;padding:7px 2px;
         line-height:1.25;white-space:normal;word-break:break-word}
  .d-hidden{position:absolute;left:50%;bottom:0;width:1px;height:1px;opacity:0;
            pointer-events:none;border:0;padding:0;margin:0}

  /* ===== Tables ===== */
  table{width:100%;border-collapse:collapse;table-layout:fixed}
  th,td{border:1px solid var(--line)}
  th{font-weight:800;font-size:12.5px;padding:6px 2px;color:var(--green-deep)}
  thead.order th{background:var(--green)}
  thead.buy th{background:var(--peach);color:var(--peach-text)}
  .buy-title{background:var(--peach);color:var(--peach-text);font-weight:800;font-size:13.5px;
             text-align:center;padding:7px;border:1px solid var(--line);border-top:none}
  td.cell{height:27px;position:relative}
  td.cell input{width:100%;height:100%;border:none;background:transparent;font-family:inherit;
                font-size:13px;text-align:center;padding:0 5px;color:var(--ink);outline:none}
  td.cell input:focus{background:#fffbe9}
  td.cell input.fmtnum{font-size:11.5px;letter-spacing:-.2px}
  .del{position:absolute;top:0;inset-inline-start:0;width:16px;height:16px;border:none;
       border-radius:0 0 7px 0;background:#efc9c2;color:#b23a2d;font-size:12px;line-height:16px;
       font-weight:800;padding:0;cursor:pointer;opacity:0;visibility:hidden;z-index:4;
       text-align:center;touch-action:manipulation;transition:opacity .12s}
  tr:focus-within .del{opacity:.95;visibility:visible}
  .del:active{opacity:1;background:#e6b0a7}
  td.cell textarea{width:100%;border:none;background:transparent;font-family:inherit;font-size:13px;
                   text-align:start;line-height:1.35;padding:5px 6px;resize:none;overflow:hidden;
                   color:var(--ink);outline:none;display:block;height:26px;min-height:26px}
  td.cell textarea:focus{background:#fffbe9}

  /* ===== Hadaf ===== */
  .hadaf td{border:1px solid var(--line);vertical-align:middle}
  .hadaf-label{background:var(--green);font-weight:800;font-size:12.5px;color:var(--green-deep);
               text-align:center;width:17%}
  .hadaf-input textarea{width:100%;min-height:112px;border:none;background:transparent;
               font-family:inherit;font-size:13px;line-height:28px;padding:0 8px;resize:none;
               outline:none;color:var(--ink);
               background-image:repeating-linear-gradient(to bottom,transparent 0,transparent 27px,#6f6d63 27px,#6f6d63 28px)}
  .hadaf-input textarea:focus{background-color:#fffbe9}

  /* ===== Signatures ===== */
  .sign th{background:#fff;color:var(--ink);font-size:12.5px;padding:7px 4px}
  .sign td.cell{height:34px}
  .sign td.cell input{font-weight:700}
  .sign .sigblank td{height:54px;border:1px solid var(--line)}

  /* ===== Tools / bar / toast ===== */
  .printwrap{max-width:520px;margin:10px auto 0;text-align:center}
  .btn-print{display:inline-flex;align-items:center;gap:6px;border:1.4px solid var(--green-deep);
             background:#fff;color:var(--green-deep);font-family:inherit;font-weight:700;
             font-size:12.5px;padding:7px 16px;border-radius:8px;cursor:pointer;touch-action:manipulation}
  .btn-print:active{transform:scale(.96)}
  .toast{position:fixed;bottom:20px;inset-inline:14px;z-index:100;background:#23241f;color:#fff;
         padding:13px 16px;border-radius:11px;font-weight:600;font-size:14px;text-align:center;
         box-shadow:0 10px 30px rgba(0,0,0,.3);transform:translateY(150%);opacity:0;
         transition:all .3s cubic-bezier(.2,.9,.3,1)}
  .toast.show{transform:translateY(0);opacity:1}
  .toast.ok{background:#1c4d34}.toast.err{background:#7a2620}

  /* ===== Login ===== */
  #app{display:none}
  #login{position:fixed;inset:0;z-index:1000;background:linear-gradient(135deg,#234634,#16271d);
         display:flex;align-items:center;justify-content:center;padding:20px}
  .login-card{width:100%;max-width:330px;background:#fff;border-radius:16px;padding:24px 20px 20px;
              box-shadow:0 20px 50px rgba(0,0,0,.4);text-align:center}
  .login-card img{width:120px;height:auto;margin:0 auto 4px;display:block}
  .login-title{font-weight:800;font-size:15px;color:var(--green-deep);margin:4px 0 18px}
  .login-card input{width:100%;font-family:inherit;font-size:16px;padding:12px;margin-bottom:12px;
                    border:1.5px solid var(--line);border-radius:10px;background:#fbfaf6;outline:none;
                    text-align:center;color:var(--ink)}
  .login-card input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(184,152,90,.15)}
  .login-btn{width:100%;border:none;border-radius:10px;padding:13px;font-family:inherit;font-weight:800;
             font-size:16px;color:#1c1c18;cursor:pointer;
             background:linear-gradient(135deg,var(--gold),var(--gold-deep));
             box-shadow:0 6px 16px rgba(184,152,90,.35)}
  .login-btn:active{transform:scale(.985)}
  .login-err{color:#c0392b;font-size:13px;min-height:18px;margin-top:10px;font-weight:600}
  #logoutBtn{border-color:#c2453a;color:#c2453a}

  @media print{
    *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
    body{background:#fff;padding:0}
    .printwrap,.toast,.del,#login{display:none!important}
    .sheet{box-shadow:none;max-width:100%}
  }
</style>
</head>

      </div>
    </div>

    <!-- الطلب -->
    <table>
      <colgroup><col style="width:17%"><col style="width:17%"><col style="width:49%"><col style="width:17%"></colgroup>
      <thead class="order"><tr><th>الوزن</th><th>السعر</th><th>البيان</th><th>العمولة</th></tr></thead>
      <tbody id="orderRows"></tbody>
    </table>

    <!-- أوامر الشراء -->
    <div class="buy-title">أوامر الشراء</div>
    <table>
      <colgroup><col style="width:17%"><col style="width:17%"><col style="width:49%"><col style="width:17%"></colgroup>
      <thead class="buy"><tr><th>الوزن</th><th>السعر</th><th>ملاحظات</th><th>العمولة</th></tr></thead>
      <tbody id="buyRows"></tbody>
    </table>

    <!-- الهدف -->
    <table class="hadaf">
      <tr>
        <td class="hadaf-label">الهدف تحقيقه</td>
        <td class="hadaf-input"><textarea id="target"></textarea></td>
      </tr>
    </table>

    <!-- التواقيع -->
    <table class="sign">
      <tr><th>مقدم الطلب</th><th>تعميد الطلب</th></tr>
      <tr>
        <td class="cell"><input type="text" id="submitter"></td>
        <td class="cell"><input type="text" id="approver"></td>
      </tr>
      <tr class="sigblank"><td></td><td></td></tr>
    </table>
  </div>

  <div class="printwrap">
    <button class="btn-print" id="printBtn">🖨 طباعة</button>
    <button class="btn-print" id="logoutBtn">خروج</button>
  </div>
  </div><!-- /#app -->

  <div id="login">
    <div class="login-card">
      <img id="loginLogo" alt="SWAG">
      <div class="login-title">طلب اوردر فرع السبائك</div>
      <input type="text" id="loginUser" placeholder="اسم المستخدم" autocomplete="username" autocapitalize="off">
      <input type="password" id="loginPass" placeholder="كلمة المرور" autocomplete="current-password">
      <button class="login-btn" id="loginBtn">تسجيل الدخول</button>
      <div class="login-err" id="loginErr"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
const CONFIG = { SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxnORtVDEzbQHNfcwFTp7UCGnTU-gEdYMRp8tytyqajNgb8pPflQuvZ5S1Jd8fM6THMlg/exec" };   /* <-- Apps Script /exec URL yaha */

const $ = id => document.getElementById(id);
$('orderDate').valueAsDate = new Date();
function renderDate(){const v=$('orderDate').value,b=$('dateBtn');
  if(!v){b.textContent='—';return;} const p=v.split('-'); b.textContent=(+p[2])+'/'+(+p[1])+'/'+p[0];}
$('dateBtn').addEventListener('click',()=>{const i=$('orderDate');
  if(i.showPicker){try{i.showPicker();return;}catch(e){}} i.focus(); i.click();});
$('orderDate').addEventListener('change',()=>{renderDate();persist();});
renderDate();
$('submitter').value = localStorage.getItem('swag_submitter') || 'حسين الصلاحي';
$('approver').value  = localStorage.getItem('swag_approver')  || 'محمد الصلاحي';
['submitter','approver'].forEach(id=>$(id).addEventListener('change',
  ()=>localStorage.setItem('swag_'+id,$(id).value)));

function orderRow(){const tr=document.createElement('tr');
  tr.innerHTML=`<td class="cell"><button type="button" class="del" tabindex="-1">×</button><input type="text" inputmode="decimal" class="fmtnum f-weight"></td>
    <td class="cell"><input type="text" inputmode="decimal" class="fmtnum f-price"></td>
    <td class="cell"><textarea class="f-desc" rows="1"></textarea></td>
    <td class="cell"><input type="text" inputmode="decimal" class="fmtnum f-comm"></td>`;return tr;}
function buyRow(){const tr=document.createElement('tr');
  tr.innerHTML=`<td class="cell"><button type="button" class="del" tabindex="-1">×</button><input type="text" inputmode="decimal" class="fmtnum f-weight"></td>
    <td class="cell"><input type="text" inputmode="decimal" class="fmtnum f-price"></td>
    <td class="cell"><textarea class="f-note" rows="1"></textarea></td>
    <td class="cell"><input type="text" inputmode="decimal" class="fmtnum f-comm"></td>`;return tr;}

for(let i=0;i<4;i++)$('orderRows').appendChild(orderRow());
for(let i=0;i<9;i++)$('buyRows').appendChild(buyRow());

/* ===== Rows: full ho to auto-add, aur delete (×) ===== */
function rowEmpty(r){return [...r.querySelectorAll('input,textarea')].every(i=>!i.value.trim());}
function ensureTail(tb){
  const make = tb.id==='orderRows'?orderRow:buyRow;
  const rows=tb.children;
  if(rows.length===0 || !rowEmpty(rows[rows.length-1])) tb.appendChild(make());
}
function delRow(r){
  const tb=r.parentNode;
  if(tb.children.length>1) r.remove();
  else r.querySelectorAll('input,textarea').forEach(i=>i.value='');
  ensureTail(tb); persist();
}
[$('orderRows'),$('buyRows')].forEach(tb=>{
  tb.addEventListener('click',e=>{const b=e.target.closest('.del'); if(b) delRow(b.closest('tr'));});
  tb.addEventListener('input',()=>ensureTail(tb));
});

/* ===== Auto-save (data erase na ho) ===== */
const STORE='swag_form_state';
function snapshot(){
  return {
    metal:(document.querySelector('input[name="metal"]:checked')||{}).value||'ذهب',
    date:$('orderDate').value, target:$('target').value,
    submitter:$('submitter').value, approver:$('approver').value,
    orders:[...$('orderRows').children].map(r=>({
      weight:r.querySelector('.f-weight').value, price:r.querySelector('.f-price').value,
      desc:r.querySelector('.f-desc').value, commission:r.querySelector('.f-comm').value})),
    buys:[...$('buyRows').children].map(r=>({
      weight:r.querySelector('.f-weight').value, price:r.querySelector('.f-price').value,
      note:r.querySelector('.f-note').value, commission:r.querySelector('.f-comm').value}))
  };
}
let saveT;
function persist(){clearTimeout(saveT);saveT=setTimeout(()=>{
  try{localStorage.setItem(STORE,JSON.stringify(snapshot()));}catch(e){}
},250);}
function restore(){
  let d;try{d=JSON.parse(localStorage.getItem(STORE)||'null');}catch(e){d=null;}
  if(!d)return;
  if(d.metal){const r=document.querySelector('input[name="metal"][value="'+d.metal+'"]');if(r)r.checked=true;}
  if(d.date)$('orderDate').value=d.date;
  if(d.target!=null)$('target').value=d.target;
  if(d.submitter)$('submitter').value=d.submitter;
  if(d.approver)$('approver').value=d.approver;
  if(Array.isArray(d.orders)){$('orderRows').innerHTML='';
    d.orders.forEach(o=>{const r=orderRow();
      r.querySelector('.f-weight').value=o.weight||''; r.querySelector('.f-price').value=o.price||'';
      r.querySelector('.f-desc').value=o.desc||''; r.querySelector('.f-comm').value=o.commission||'';
      $('orderRows').appendChild(r);});}
  if(Array.isArray(d.buys)){$('buyRows').innerHTML='';
    d.buys.forEach(b=>{const r=buyRow();
      r.querySelector('.f-weight').value=b.weight||''; r.querySelector('.f-price').value=b.price||'';
      r.querySelector('.f-note').value=b.note||''; r.querySelector('.f-comm').value=b.commission||'';
      $('buyRows').appendChild(r);});}
  while($('orderRows').children.length<4)$('orderRows').appendChild(orderRow());
  while($('buyRows').children.length<9)$('buyRows').appendChild(buyRow());
}
restore();
renderDate();
ensureTail($('orderRows')); ensureTail($('buyRows'));
['input','change'].forEach(ev=>document.querySelector('.sheet').addEventListener(ev,persist));
/* ===== Lamba text -> row auto badhe ===== */
function autoGrow(el){el.style.height='auto';el.style.height=el.scrollHeight+'px';}
document.querySelector('.sheet').addEventListener('input',e=>{if(e.target.tagName==='TEXTAREA')autoGrow(e.target);});
document.querySelectorAll('.sheet textarea').forEach(autoGrow);
/* ===== Number format: 65,846.00 ===== */
function fmtField(el){const r=el.value.trim();if(r==='')return;
  el.value=num(r).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});persist();}
function rawField(el){const r=el.value.trim();if(r==='')return;el.value=String(num(r));}
document.querySelector('.sheet').addEventListener('focusin',e=>{if(e.target.classList&&e.target.classList.contains('fmtnum'))rawField(e.target);});
document.querySelector('.sheet').addEventListener('focusout',e=>{if(e.target.classList&&e.target.classList.contains('fmtnum'))fmtField(e.target);});
document.querySelectorAll('.sheet .fmtnum').forEach(fmtField);

let tT;function toast(m,k){const t=$('toast');t.className='toast '+(k||'')+' show';t.textContent=m;
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),3200);}
function num(v){if(v==null)return 0;const n=parseFloat((''+v).replace(/,/g,''));return isNaN(n)?0:n;}
function collect(){
  const orders=[...$('orderRows').children].map(r=>({
    weight:num(r.querySelector('.f-weight').value),price:num(r.querySelector('.f-price').value),
    desc:r.querySelector('.f-desc').value.trim(),commission:num(r.querySelector('.f-comm').value)
  })).filter(o=>o.weight||o.price||o.desc||o.commission);
  const buys=[...$('buyRows').children].map(r=>({
    weight:num(r.querySelector('.f-weight').value),price:num(r.querySelector('.f-price').value),
    note:r.querySelector('.f-note').value.trim(),commission:num(r.querySelector('.f-comm').value)
  })).filter(b=>b.weight||b.price||b.note||b.commission);
  return{metal:document.querySelector('input[name="metal"]:checked').value,date:$('orderDate').value,
    target:$('target').value.trim(),submitter:$('submitter').value.trim(),
    approver:$('approver').value.trim(),orders,buys};
}
let lastSaved=localStorage.getItem('swag_lastSaved')||'';
async function syncToSheet(){
  const data=collect();
  if(!CONFIG.SCRIPT_URL) return;                       // URL set nahi to skip
  if(!data.orders.length && !data.buys.length) return; // khali to skip
  const hash=JSON.stringify(data);
  if(hash===lastSaved) return;                         // change nahi to dobara save nahi
  try{
    const res=await fetch(CONFIG.SCRIPT_URL,{method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(data)});
    const out=await res.json();
    if(out&&out.ok){lastSaved=hash;try{localStorage.setItem('swag_lastSaved',hash);}catch(e){}toast('تم الحفظ في الشيت ✓','ok');}
  }catch(e){/* offline ho to bhi print chalega */}
}
$('printBtn').addEventListener('click',async()=>{
  await syncToSheet();   // background me sheet sync
  window.print();        // phir print
});

/* ===== PWA: offline ===== */
if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

/* ===== Login / Auth ===== */
const AUTH={user:"swag",passHash:"650f8aa2b6341f25b3f8916e6ec1d85777f22b8335e8ee2b0fb7a4cfdd8b82a9"};
async function sha256(t){
  if(window.crypto&&crypto.subtle){
    const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(t));
    return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  // fallback (rare): simple hash
  let h=0;for(let i=0;i<t.length;i++){h=(h*31+t.charCodeAt(i))>>>0;}return 'fb'+h;
}
function showApp(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  try{document.querySelectorAll('.sheet textarea').forEach(autoGrow);}catch(e){}
}
function showLogin(){
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  setTimeout(()=>document.getElementById('loginUser').focus(),100);
}
async function tryLogin(){
  const u=document.getElementById('loginUser').value.trim().toLowerCase();
  const p=document.getElementById('loginPass').value;
  const h=await sha256(p);
  if(u===AUTH.user && h===AUTH.passHash){
    localStorage.setItem('swag_auth','1'); document.getElementById('loginErr').textContent=''; showApp();
  }else{
    document.getElementById('loginErr').textContent='اسم المستخدم أو كلمة المرور غير صحيحة';
    document.getElementById('loginPass').value='';
  }
}
(function(){
  const lg=document.querySelector('.logo-img'); if(lg)document.getElementById('loginLogo').src=lg.src;
  document.getElementById('loginBtn').addEventListener('click',tryLogin);
  document.getElementById('loginPass').addEventListener('keydown',e=>{if(e.key==='Enter')tryLogin();});
  document.getElementById('loginUser').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPass').focus();});
  document.getElementById('logoutBtn').addEventListener('click',()=>{localStorage.removeItem('swag_auth');location.reload();});
  if(localStorage.getItem('swag_auth')==='1'){showApp();}else{showLogin();}
})();

</script>
</body>
</html>
